# Document extractor — stage 1 of the doc_pipeline.
# This is a PROCESSOR worker (not LLM). It runs DoclingBackend to extract
# text, tables, and structure from PDF/DOCX files.
#
# Run with:  heddle processor --config configs/workers/doc_extractor.yaml \
#                           --nats-url nats://localhost:4222 \
#                           --workspace-dir /tmp/docman-workspace
# Subscribes to: heddle.tasks.doc_extractor.local
#
# NOTE: The docman package must be installed for the processing_backend
#       class path to resolve. Install with: pip install -e /path/to/docman

name: "doc_extractor"
worker_kind: "processor"
processing_backend: "docman.backends.docling_backend.DoclingBackend"
backend_config:
  workspace_dir: "/tmp/docman-workspace"
  # Docling tuning options (see docs/docling-setup.md for full reference)
  # These are read by DoclingBackend._build_converter()
  device: "mps"              # "auto" | "cpu" | "mps" | "cuda" — use "mps" on Apple Silicon
  num_threads: 8             # M1 Pro has 8 performance cores
  ocr_engine: "ocrmac"       # "ocrmac" (macOS native) | "easyocr" | "tesseract"
  do_ocr: true               # Enable OCR for scanned PDFs
  do_table_structure: true   # Enable table structure recognition
  layout_batch_size: 4       # Pages per batch for layout detection (4-8 safe on 32GB)
  ocr_batch_size: 4          # Pages per batch for OCR (4-8 safe on 32GB)

default_model_tier: "local"
timeout_seconds: 120

input_schema_ref: "docman.contracts.ExtractorInput"
output_schema_ref: "docman.contracts.ExtractorOutput"
