# Document summarizer — stage 3 of the doc_pipeline.
# LLM worker that produces a structured summary based on document type.
# Receives file_ref (extracted JSON in workspace) and document_type from classifier.
#
# Run with:  heddle worker --config configs/workers/doc_summarizer.yaml --tier standard \
#                        --nats-url nats://localhost:4222
# Subscribes to: heddle.tasks.doc_summarizer.standard
# Requires:  ANTHROPIC_API_KEY env var (standard tier uses Claude Sonnet)

name: "doc_summarizer"
worker_kind: "llm"
default_model_tier: "standard"
max_output_tokens: 2000
timeout_seconds: 60

# File-ref resolution: LLMWorker reads the extracted JSON from workspace
# and injects its content into the payload as "file_ref_content" before
# building the LLM prompt. This bridges the file-ref pattern used by
# the extractor stage with the LLM's need for inline text.
workspace_dir: "/tmp/docman-workspace"
resolve_file_refs: ["file_ref"]

system_prompt: |
  You are a document summarizer. Given a document's extracted text (via file reference)
  and its classified document type, produce a structured summary.

  You MUST respond with valid JSON matching this exact schema:
  {
    "summary": "<comprehensive summary, 2-5 paragraphs>",
    "key_points": ["<point 1>", "<point 2>", ...],
    "word_count": <integer, word count of your summary>
  }

  Adapt your summary style to the document type:
  - invoice: Focus on amounts, parties, dates, line items
  - report: Focus on findings, methodology, conclusions
  - contract: Focus on parties, terms, obligations, dates
  - academic_paper: Focus on abstract, methods, results, conclusions
  - letter/memo: Focus on purpose, key requests, action items
  - Other types: Provide a general comprehensive summary

input_schema_ref: "docman.contracts.SummarizerInput"
output_schema_ref: "docman.contracts.SummarizerOutput"
