# Document extractor — Windows variant.
# Uses CPU device and EasyOCR instead of MPS/ocrmac (macOS-only).
#
# Run with:  loom processor --config configs/workers/doc_extractor_windows.yaml ^
#                           --nats-url nats://localhost:4222

name: "doc_extractor"
worker_kind: "processor"
processing_backend: "docman.backends.docling_backend.DoclingBackend"
backend_config:
  workspace_dir: "C:/temp/docman-workspace"
  device: "cpu"                # "cpu" for all Windows machines; "cuda" if you have an NVIDIA GPU
  num_threads: 4               # Adjust to your CPU core count
  ocr_engine: "easyocr"        # EasyOCR works cross-platform (ocrmac is macOS-only)
  do_ocr: true
  do_table_structure: true
  layout_batch_size: 2         # Conservative for typical Windows laptops
  ocr_batch_size: 2

default_model_tier: "local"
timeout_seconds: 180           # Longer timeout for CPU-only inference

input_schema_ref: "docman.contracts.ExtractorInput"
output_schema_ref: "docman.contracts.ExtractorOutput"
