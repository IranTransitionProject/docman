# Document query — standalone analytics worker.
# This is a PROCESSOR worker (not LLM). It runs DuckDBQueryBackend to
# search, filter, and analyze documents stored in the DuckDB database.
#
# Run with:  heddle processor --config configs/workers/doc_query.yaml \
#                           --nats-url nats://localhost:4222
# Subscribes to: heddle.tasks.doc_query.local
#
# NOTE: The docman package must be installed for the processing_backend
#       class path to resolve. Install with: pip install -e /path/to/docman

name: "doc_query"
worker_kind: "processor"
processing_backend: "docman.backends.duckdb_query.DuckDBQueryBackend"
backend_config:
  db_path: "/tmp/docman-workspace/docman.duckdb"

default_model_tier: "local"
timeout_seconds: 30

input_schema_ref: "docman.contracts.QueryInput"
output_schema_ref: "docman.contracts.QueryOutput"
