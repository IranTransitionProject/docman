# Smart document extractor — stage 1 of the doc_pipeline.
# Tries MarkItDown first (fast, no ML) and falls back to Docling (OCR,
# table structure) when the fast path produces insufficient text.
#
# Run with:  heddle processor --config configs/workers/doc_extractor_smart.yaml \
#                           --nats-url nats://localhost:4222 \
#                           --workspace-dir /tmp/docman-workspace
# Subscribes to: heddle.tasks.doc_extractor.local
#
# NOTE: The docman package must be installed for the processing_backend
#       class path to resolve. Install with: pip install -e /path/to/docman

name: "doc_extractor"
worker_kind: "processor"
processing_backend: "docman.backends.smart_extractor.SmartExtractorBackend"
backend_config:
  workspace_dir: "/tmp/docman-workspace"

  # --- Smart extractor settings ---
  min_text_length: 50            # Fallback to Docling if extracted text < this many chars
  force_docling_extensions: []   # Always use Docling for these extensions (e.g., [".tiff"])

  # --- Docling fallback settings (used only when Docling runs) ---
  device: "mps"              # "auto" | "cpu" | "mps" | "cuda"
  num_threads: 8             # M1 Pro has 8 performance cores
  ocr_engine: "ocrmac"       # "ocrmac" (macOS native) | "easyocr" | "tesseract"
  do_ocr: true               # Enable OCR for scanned PDFs
  do_table_structure: true   # Enable table structure recognition
  layout_batch_size: 4
  ocr_batch_size: 4

default_model_tier: "local"
timeout_seconds: 120

input_schema_ref: "docman.contracts.ExtractorInput"
output_schema_ref: "docman.contracts.ExtractorOutput"
