# DocMan 3-stage document processing pipeline.
# Run with:  loom pipeline --config configs/orchestrators/doc_pipeline.yaml \
#                          --nats-url nats://localhost:4222
# Submit:    loom submit "Process document" --context file_ref=report.pdf
#
# Data flow:
#   1. extract:   DoclingBackend reads PDF/DOCX → writes extracted JSON to workspace
#   2. classify:  LLM classifies document type from text_preview + metadata
#   3. summarize: LLM summarizes based on document_type and extracted text
#
# Input mappings use dot-notation paths into the pipeline context:
#   "goal.context.file_ref" → the file_ref from the submitted goal
#   "extract.output.text_preview" → text_preview from the extractor's output
#   "classify.output.document_type" → document_type from the classifier's output

name: "doc_pipeline"
timeout_seconds: 300          # Per-stage timeout (can be overridden per stage)

pipeline_stages:
  - name: "extract"
    worker_type: "doc_extractor"
    tier: "local"
    input_mapping:
      file_ref: "goal.context.file_ref"

  - name: "classify"
    worker_type: "doc_classifier"
    tier: "local"
    input_mapping:
      text_preview: "extract.output.text_preview"
      page_count: "extract.output.page_count"
      has_tables: "extract.output.has_tables"
      sections: "extract.output.sections"

  - name: "summarize"
    worker_type: "doc_summarizer"
    tier: "standard"
    input_mapping:
      file_ref: "extract.output.file_ref"
      document_type: "classify.output.document_type"
