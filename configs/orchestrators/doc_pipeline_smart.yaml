# DocMan 4-stage pipeline with smart extraction.
# Uses SmartExtractorBackend (MarkItDown-first, Docling fallback) for
# faster processing of well-structured digital documents.
#
# Run with:  loom pipeline --config configs/orchestrators/doc_pipeline_smart.yaml \
#                          --nats-url nats://localhost:4222
# Submit:    loom submit "Process document" --context file_ref=report.pdf
#
# Requires doc_extractor_smart.yaml worker config instead of doc_extractor.yaml:
#   loom processor --config configs/workers/doc_extractor_smart.yaml \
#                  --nats-url nats://localhost:4222

name: "doc_pipeline"
timeout_seconds: 300

pipeline_stages:
  - name: "extract"
    worker_type: "doc_extractor"
    tier: "local"
    input_mapping:
      file_ref: "goal.context.file_ref"

  - name: "classify"
    worker_type: "doc_classifier"
    tier: "local"
    input_mapping:
      text_preview: "extract.output.text_preview"
      page_count: "extract.output.page_count"
      has_tables: "extract.output.has_tables"
      sections: "extract.output.sections"

  - name: "summarize"
    worker_type: "doc_summarizer"
    tier: "standard"
    input_mapping:
      file_ref: "extract.output.file_ref"
      document_type: "classify.output.document_type"

  - name: "ingest"
    worker_type: "doc_ingest"
    tier: "local"
    input_mapping:
      source_file: "goal.context.file_ref"
      file_ref: "extract.output.file_ref"
      page_count: "extract.output.page_count"
      has_tables: "extract.output.has_tables"
      sections: "extract.output.sections"
      text_preview: "extract.output.text_preview"
      document_type: "classify.output.document_type"
      classification_confidence: "classify.output.confidence"
      classification_reasoning: "classify.output.reasoning"
      summary: "summarize.output.summary"
      key_points: "summarize.output.key_points"
      word_count: "summarize.output.word_count"
