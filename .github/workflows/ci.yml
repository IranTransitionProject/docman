name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# CI checks out loom to ./loom, but pyproject.toml [tool.uv.sources] points
# to ../loom (for local dev). We use UV_NO_SOURCES to skip that override in CI
# and install loom explicitly via uv pip install.
env:
  UV_NO_SOURCES: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout loom
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/loom
          path: loom
      - uses: astral-sh/setup-uv@v5
      - run: uv pip install -e "./loom[duckdb]"
      - run: uv sync --extra dev
      - run: uv run ruff check src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      # Docman depends on loom — check it out and install from source.
      - name: Checkout loom
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/loom
          path: loom

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install loom
        run: uv pip install -e "./loom[duckdb]"

      - name: Install docman
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
