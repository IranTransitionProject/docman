name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv run ruff check src/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      # Docman depends on loom — check it out and install from source.
      # Adjust the repository path if your GitHub org/user differs.
      - name: Checkout loom
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/loom
          path: loom

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      # CI checks out loom to ./loom (not ../loom as in local dev),
      # so install loom explicitly first, then sync docman deps.
      - name: Install loom
        run: uv pip install -e "./loom[duckdb]"

      - name: Install docman
        run: uv sync --extra dev --no-sources

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
